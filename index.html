<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>출석부 실습</title>
  <!-- Supabase JS SDK 불러오기 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>출석부</h1>

  <!-- 버튼 -->
  <button onclick="addRecord('홍길동','출석')">홍길동 출석 기록</button>
  <button onclick="loadAttendance()">출석부 조회</button>

  <!-- 조회 결과 표시 -->
  <ul id="attendanceList"></ul>

  <!-- Supabase 연결 및 함수 -->
  <script>
    const supabaseUrl = "https://xlfzcgpgctxjfvorzcvd.supabase.co";   // Supabase 프로젝트 URL
    const supabaseKey = "sb_publishable_feppVDg0bRY-Rf9NsaeS9w_u18tS5sF";      // anon public key
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 출석 기록 추가
    async function addRecord(name, status) {
      const { data, error } = await supabase
        .from('attendance')
        .insert([
          { date: new Date().toISOString().split('T')[0], name, status }
        ]);

      if (error) {
        console.error("저장 에러:", error);
      } else {
        console.log("저장 성공:", data);
      }
    }

    // 출석부 조회
    async function loadAttendance() {
      const { data, error } = await supabase
        .from('attendance')
        .select('*')
        .order('id', { ascending: true });

      if (error) {
        console.error("조회 에러:", error);
      } else {
        console.log("출석부:", data);
        const list = document.getElementById("attendanceList");
        list.innerHTML = "";
        data.forEach(record => {
          const li = document.createElement("li");
          li.textContent = `${record.date} | ${record.name} | ${record.status}`;
          list.appendChild(li);
        });
      }
    }
  </script>
</body>
</html>
