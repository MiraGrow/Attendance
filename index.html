<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출석부 관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .input-group { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .delete-btn:hover { background: #cc0000; }
    </style>
</head>
<body>
    <h1>출석부 관리</h1>

    <div class="input-group">
        <input type="text" id="userName" placeholder="이름 입력">
        <select id="userStatus">
            <option value="출석">출석</option>
            <option value="결석">결석</option>
            <option value="지각">지각</option>
        </select>
        <button id="btn-add">기록하기</button>
        <button id="btn-load">전체 조회</button>
    </div>

    <ul id="attendanceList"></ul>

    <script>
        const supabaseUrl = "https://xlfzcgpgctxjfvorzcvd.supabase.co";
        const supabaseKey = "sb_publishable_feppVDg0bRY-Rf9NsaeS9w_u18tS5sF"; 
        
        const client = supabase.createClient(supabaseUrl, supabaseKey, {
            auth: { persistSession: false }
        });

        // 1. 기록 추가 (이름, 상태를 입력받음)
        async function addRecord() {
            const name = document.getElementById('userName').value;
            const status = document.getElementById('userStatus').value;

            if (!name) {
                alert("이름을 입력해주세요!");
                return;
            }

            const { error } = await client
                .from('attendance')
                .insert([{ 
                    date: new Date().toISOString().split('T')[0], 
                    name: name, 
                    status: status 
                }]);

            if (error) {
                alert("저장 실패: " + error.message);
            } else {
                document.getElementById('userName').value = ""; // 입력창 비우기
                loadAttendance(); // 목록 새로고침
            }
        }

        // 2. 기록 조회 및 삭제 버튼 생성
        async function loadAttendance() {
            const { data, error } = await client
                .from('attendance')
                .select('*')
                .order('id', { ascending: false }); // 최신순 정렬

            if (error) {
                console.error("조회 에러:", error.message);
            } else {
                const list = document.getElementById("attendanceList");
                list.innerHTML = "";
                data.forEach(record => {
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <span>${record.date} | <strong>${record.name}</strong> | [${record.status}]</span>
                        <button class="delete-btn" onclick="deleteRecord(${record.id})">삭제</button>
                    `;
                    list.appendChild(li);
                });
            }
        }

        // 3. 기록 삭제 함수
        async function deleteRecord(id) {
            if (!confirm("정말 삭제하시겠습니까?")) return;

            const { error } = await client
                .from('attendance')
                .delete()
                .eq('id', id); // 고유 ID가 일치하는 행만 삭제

            if (error) {
                alert("삭제 실패: " + error.message);
            } else {
                loadAttendance(); // 삭제 후 목록 새로고침
            }
        }

        // 이벤트 연결
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-add').addEventListener('click', addRecord);
            document.getElementById('btn-load').addEventListener('click', loadAttendance);
            
            // 전역 함수로 등록 (onclick 호출용)
            window.deleteRecord = deleteRecord;
        });
    </script>
</body>
</html>
