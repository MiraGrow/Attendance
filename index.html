<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>출석부 실습</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>출석부</h1>

  <button onclick="addRecord('홍길동','출석')">홍길동 출석 기록</button>
  <button onclick="loadAttendance()">출석부 조회</button>

  <ul id="attendanceList"></ul>

  <script>
    const supabaseUrl = "YOUR_PROJECT_URL";   // 대시보드에서 복사
    const supabaseKey = "YOUR_ANON_KEY";      // 대시보드에서 복사
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    async function addRecord(name, status) {
      const { data, error } = await client
        .from('attendance')
        .insert([{ date: new Date().toISOString().split('T')[0], name, status }]);

      if (error) {
        console.error("저장 에러:", error);
      } else {
        console.log("저장 성공:", data);
      }
    }

    async function loadAttendance() {
      const { data, error } = await client
        .from('attendance')
        .select('*')
        .order('id', { ascending: true });

      if (error) {
        console.error("조회 에러:", error);
      } else {
        const list = document.getElementById("attendanceList");
        list.innerHTML = "";
        data.forEach(record => {
          const li = document.createElement("li");
          li.textContent = `${record.date} | ${record.name} | ${record.status}`;
          list.appendChild(li);
        });
      }
    }
  </script>
</body>
</html>
