<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출석부 실습</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>출석부</h1>

    <button id="btn-add">홍길동 출석 기록</button>
    <button id="btn-load">출석부 조회</button>

    <ul id="attendanceList"></ul>

    <script>
        // 1. 초기화 (이미 선언되었는지 확인하여 중복 에러 방지)
        const supabaseUrl = "https://xlfzcgpgctxjfvorzcvd.supabase.co";
        const supabaseKey = "여기에_본인의_ANON_KEY를_입력하세요"; 
        
        // 브라우저 차단 에러를 피하기 위해 persistSession을 false로 설정합니다.
        const client = supabase.createClient(supabaseUrl, supabaseKey, {
            auth: { persistSession: false }
        });

        // 2. 기록 추가 함수
        async function addRecord(name, status) {
            const { data, error } = await client
                .from('attendance')
                .insert([{ 
                    date: new Date().toISOString().split('T')[0], 
                    name: name, 
                    status: status 
                }]);

            if (error) {
                console.error("저장 에러:", error.message);
                alert("저장 실패: " + error.message);
            } else {
                console.log("저장 성공!");
                alert("출석 기록이 완료되었습니다.");
                loadAttendance(); // 저장 후 목록 자동 갱신
            }
        }

        // 3. 기록 조회 함수
        async function loadAttendance() {
            const { data, error } = await client
                .from('attendance')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error("조회 에러:", error.message);
            } else {
                const list = document.getElementById("attendanceList");
                list.innerHTML = "";
                data.forEach(record => {
                    const li = document.createElement("li");
                    li.textContent = `${record.date} | ${record.name} | ${record.status}`;
                    list.appendChild(li);
                });
            }
        }

        // 4. 이벤트 리스너 연결 (ReferenceError 방지)
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-add').addEventListener('click', () => {
                addRecord('홍길동', '출석');
            });
            document.getElementById('btn-load').addEventListener('click', loadAttendance);
        });
    </script>
</body>
</html>
